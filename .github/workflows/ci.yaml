name: ci tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Install mocha
        run: npm install --save-dev mocha
        
      - name: Unit tests
        run: npm run mocha:test

      - name: Lint
        run: eslint:check